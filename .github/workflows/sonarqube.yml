name: SonarQube Analysis

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  sonarqube:
    name: Build and SonarQube Scan
    runs-on: [self-hosted, linux]

    env:
      MAVEN_SETTINGS_FILE: ${{ runner.temp }}/maven/.m2/settings.xml
      MAVEN_LOCAL_REPO: ${{ runner.temp }}/maven/.m2/repository

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: github/actions/setup-java@main
        with:
          java-version: 17

      - name: Verify Java and Maven
        shell: bash
        run: |
          set -euo pipefail

          echo "RUNNER_OS=${RUNNER_OS:-}"
          echo "RUNNER_ARCH=${RUNNER_ARCH:-}"
          echo "RUNNER_NAME=${RUNNER_NAME:-}"
          echo "JAVA_HOME=${JAVA_HOME:-not set}"
          echo "MAVEN_SETTINGS_FILE=$MAVEN_SETTINGS_FILE"
          echo "MAVEN_LOCAL_REPO=$MAVEN_LOCAL_REPO"

          java -version
          mvn -version

          JAVA_VERSION=$(java -version 2>&1 | awk -F '"' '/version/ {print $2}')
          JAVA_MAJOR=$(echo "$JAVA_VERSION" | awk -F. '{ if ($1 == "1") print $2; else print $1 }')

          if [ -z "$JAVA_MAJOR" ]; then
            echo "ERROR: Cannot detect Java major version from: $JAVA_VERSION"
            exit 1
          fi

          if [ "$JAVA_MAJOR" -ne 17 ]; then
            echo "ERROR: Java 17 is required, but found Java $JAVA_VERSION"
            exit 1
          fi

          echo "Java $JAVA_VERSION detected. OK."

      - name: Prepare Maven directories
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "$MAVEN_SETTINGS_FILE")"
          mkdir -p "$MAVEN_LOCAL_REPO"

          echo "Prepared Maven settings file path: $MAVEN_SETTINGS_FILE"
          echo "Prepared Maven local repository: $MAVEN_LOCAL_REPO"

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ${{ env.MAVEN_LOCAL_REPO }}
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', 'lib/*.jar') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Write Maven settings.xml
        shell: bash
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
        run: |
          set -euo pipefail

          if [ -z "${NEXUS_USERNAME:-}" ]; then
            echo "ERROR: NEXUS_USERNAME secret is missing."
            exit 1
          fi

          if [ -z "${NEXUS_PASSWORD:-}" ]; then
            echo "ERROR: NEXUS_PASSWORD secret is missing."
            exit 1
          fi

          if [ -z "${NEXUS_URL:-}" ]; then
            echo "ERROR: NEXUS_URL secret is missing."
            exit 1
          fi

          mkdir -p "$(dirname "$MAVEN_SETTINGS_FILE")"
          mkdir -p "$MAVEN_LOCAL_REPO"

          xml_escape() {
            printf '%s' "$1" \
              | sed -e 's/&/\&amp;/g' \
                    -e 's/</\&lt;/g' \
                    -e 's/>/\&gt;/g' \
                    -e 's/"/\&quot;/g' \
                    -e "s/'/\&apos;/g"
          }

          NEXUS_USERNAME_ESCAPED=$(xml_escape "$NEXUS_USERNAME")
          NEXUS_PASSWORD_ESCAPED=$(xml_escape "$NEXUS_PASSWORD")
          NEXUS_URL_ESCAPED=$(xml_escape "$NEXUS_URL")

          cat > "$MAVEN_SETTINGS_FILE" <<EOF_SETTINGS
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>nexus</id>
                <username>${NEXUS_USERNAME_ESCAPED}</username>
                <password>${NEXUS_PASSWORD_ESCAPED}</password>
              </server>
            </servers>

            <mirrors>
              <mirror>
                <id>nexus</id>
                <mirrorOf>*</mirrorOf>
                <url>${NEXUS_URL_ESCAPED}</url>
              </mirror>
            </mirrors>

            <profiles>
              <profile>
                <id>nexus-profile</id>
                <repositories>
                  <repository>
                    <id>nexus</id>
                    <url>${NEXUS_URL_ESCAPED}</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>nexus</id>
                    <url>${NEXUS_URL_ESCAPED}</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>

            <activeProfiles>
              <activeProfile>nexus-profile</activeProfile>
            </activeProfiles>
          </settings>
          EOF_SETTINGS

          echo "Maven settings.xml created at $MAVEN_SETTINGS_FILE"
          echo "Maven local repository set to $MAVEN_LOCAL_REPO"

      - name: Install DB2 JDBC dependencies into local Maven repository
        shell: bash
        run: |
          set -euo pipefail

          DB2_JCC_JAR="lib/db2jcc4-4.0.jar"
          DB2_LICENSE_JAR="lib/db2jcc-license-cisuz-4.0.jar"

          if [ ! -f "$MAVEN_SETTINGS_FILE" ]; then
            echo "ERROR: Maven settings file not found: $MAVEN_SETTINGS_FILE"
            exit 1
          fi

          echo "Current lib folder:"
          ls -la lib

          if [ ! -f "$DB2_JCC_JAR" ]; then
            echo "ERROR: $DB2_JCC_JAR not found."
            exit 1
          fi

          if [ ! -f "$DB2_LICENSE_JAR" ]; then
            echo "ERROR: $DB2_LICENSE_JAR not found."
            exit 1
          fi

          mvn -B -s "$MAVEN_SETTINGS_FILE" -Dmaven.repo.local="$MAVEN_LOCAL_REPO" org.apache.maven.plugins:maven-install-plugin:2.4:install-file \
            -DgroupId=com.ibm.db2 \
            -DartifactId=db2jcc4 \
            -Dversion=4.0 \
            -Dpackaging=jar \
            -Dfile="$DB2_JCC_JAR"

          mvn -B -s "$MAVEN_SETTINGS_FILE" -Dmaven.repo.local="$MAVEN_LOCAL_REPO" org.apache.maven.plugins:maven-install-plugin:2.4:install-file \
            -DgroupId=com.ibm.db2 \
            -DartifactId=db2jcc-license-cisuz \
            -Dversion=4.0 \
            -Dpackaging=jar \
            -Dfile="$DB2_LICENSE_JAR"

          echo "Installed com.ibm.db2:db2jcc4:4.0 from $DB2_JCC_JAR"
          echo "Installed com.ibm.db2:db2jcc-license-cisuz:4.0 from $DB2_LICENSE_JAR"

      - name: Verify DB2 dependencies installed locally
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking local Maven repository: $MAVEN_LOCAL_REPO"

          if [ ! -f "$MAVEN_LOCAL_REPO/com/ibm/db2/db2jcc4/4.0/db2jcc4-4.0.jar" ]; then
            echo "ERROR: com.ibm.db2:db2jcc4:4.0 was not installed locally."
            find "$MAVEN_LOCAL_REPO/com/ibm/db2" -type f 2>/dev/null || true
            exit 1
          fi

          if [ ! -f "$MAVEN_LOCAL_REPO/com/ibm/db2/db2jcc-license-cisuz/4.0/db2jcc-license-cisuz-4.0.jar" ]; then
            echo "ERROR: com.ibm.db2:db2jcc-license-cisuz:4.0 was not installed locally."
            find "$MAVEN_LOCAL_REPO/com/ibm/db2" -type f 2>/dev/null || true
            exit 1
          fi

          echo "DB2 dependencies are installed in local Maven repository."

      - name: Build and analyze
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          PROJECT_KEY: ${{ github.event.repository.name }}
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "ERROR: SONAR_TOKEN secret is missing."
            exit 1
          fi

          if [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "ERROR: SONAR_HOST_URL secret is missing."
            exit 1
          fi

          if [ ! -f "$MAVEN_SETTINGS_FILE" ]; then
            echo "ERROR: Maven settings file not found: $MAVEN_SETTINGS_FILE"
            exit 1
          fi

          mvn -B -s "$MAVEN_SETTINGS_FILE" -Dmaven.repo.local="$MAVEN_LOCAL_REPO" verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.projectKey="$PROJECT_KEY" \
            -Dsonar.projectName="$PROJECT_NAME" \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.java.source=8 \
            -Dsonar.scm.provider=git